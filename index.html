<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Good Dump</title> 
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div id="header">
        <h1> The Good Dump </h1>
        <p> hey, how are you feeling today ?</p>
    </div>

    <div id="mood-picker">
        <p>pick your mood</p>
    <button class="mood-btn" data-mood="happy">🌻 happy</button>
    <button class="mood-btn" data-mood="calm">🍃 calm</button>
    <button class="mood-btn" data-mood="anxious">🌀 anxious</button>
    <button class="mood-btn" data-mood="numb">🌫️ numb</button>
    <button class="mood-btn" data-mood="sad">🌧️ sad</button>
    <button class="mood-btn" data-mood="hopeful">🌱 hopeful</button>
    </div>

    <div id="journal-section">
        <textarea id="journal-input" placeholder="just dump it here, no rules."></textarea>
    <button id="save-btn">save my dump 🌻</button>
    </div>

    <div id="entries-feed">
       <h2>your past dumps</h2> 
    </div> 
    <script src="script.js"></script>
</body>
</html>
